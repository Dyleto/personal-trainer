<div
  class="fixed z-50 w-full h-16 max-w-lg -translate-x-1/2 bg-white border border-gray-200 rounded-full bottom-2 left-1/2 dark:bg-gray-700 dark:border-gray-600">
  <div class="grid h-full max-w-lg grid-cols-5 mx-auto">
    <button
      data-tooltip-target="tooltip-home"
      type="button"
      class="inline-flex flex-col items-center justify-center px-5 rounded-s-full hover:bg-gray-50 dark:hover:bg-gray-800 group"
      routerLink="/"
      routerLinkActive="active"
      (click)="navigateTo('/')"
      [class.active]="isActive('/')">
      <i
        class="fa-solid fa-house fa-lg text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"></i>
      <span class="sr-only">Accueil</span>
    </button>
    <div
      id="tooltip-home"
      role="tooltip"
      class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
      Accueil
      <div class="tooltip-arrow" data-popper-arrow></div>
    </div>
    <button
      data-tooltip-target="tooltip-program"
      type="button"
      class="inline-flex flex-col items-center justify-center px-5 hover:bg-gray-50 dark:hover:bg-gray-800 group"
      routerLink="/program"
      routerLinkActive="active"
      (click)="navigateTo('/program')"
      [class.active]="isActive('/program')">
      <i
        class="fa-solid fa-clipboard-list fa-lg text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"></i>

      <span class="sr-only">Programme</span>
    </button>
    <div
      id="tooltip-program"
      role="tooltip"
      class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
      Programme
      <div class="tooltip-arrow" data-popper-arrow></div>
    </div>
    <div class="flex items-center justify-center">
      <button
        data-tooltip-target="tooltip-new"
        type="button"
        class="inline-flex items-center justify-center w-10 h-10 font-medium bg-blue-600 rounded-full hover:bg-blue-700 group focus:ring-4 focus:ring-blue-300 focus:outline-none dark:focus:ring-blue-800">
        <i class="fa-solid fa-stopwatch fa-lg text-white"></i>
        <span class="sr-only">Nouvelle session</span>
      </button>
    </div>
    <div
      id="tooltip-new"
      role="tooltip"
      class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
      Nouvelle session
      <div class="tooltip-arrow" data-popper-arrow></div>
    </div>
    <button
      data-tooltip-target="tooltip-settings"
      type="button"
      class="inline-flex flex-col items-center justify-center px-5 hover:bg-gray-50 dark:hover:bg-gray-800 group">
      <i
        class="fa-solid fa-sliders fa-lg text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"></i>
      <span class="sr-only">Settings</span>
    </button>
    <div
      id="tooltip-settings"
      role="tooltip"
      class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
      Settings
      <div class="tooltip-arrow" data-popper-arrow></div>
    </div>
    <button
      data-tooltip-target="tooltip-profile"
      type="button"
      class="inline-flex flex-col items-center justify-center px-5 rounded-e-full hover:bg-gray-50 dark:hover:bg-gray-800 group">
      <i
        class="fa-solid fa-circle-user fa-lg text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"></i>
      <span class="sr-only">Profile</span>
    </button>
    <div
      id="tooltip-profile"
      role="tooltip"
      class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
      Profile
      <div class="tooltip-arrow" data-popper-arrow></div>
    </div>
  </div>
</div>
